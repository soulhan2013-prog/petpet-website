<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PetPet Generator</title>
  <meta name="description" content="Create PetPet GIF animations online">
  <style>
    body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; background: #f0f0f0; }
    h1 { color: #ff6f61; }
    input { margin: 20px 0; }
    canvas { border: 1px solid #ccc; margin-top: 20px; }
    button { padding: 10px 20px; font-size: 16px; cursor: pointer; background-color: #ff6f61; color: white; border: none; border-radius: 5px; }
    button:hover { background-color: #ff4f41; }
  </style>
</head>
<body>

<h1>PetPet Generator</h1>
<p>Upload an image and watch it get PetPet’d!</p>

<input type="file" id="upload" accept="image/*"><br>
<button id="generate">Generate GIF</button>

<canvas id="canvas" width="112" height="112"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let img = null;

// Animation frames scale
const squish = [
  [1.0, 1.0],
  [0.95, 1.05],
  [0.90, 1.10],
  [0.95, 1.05],
  [1.0, 1.0]
];

// Load uploaded image
document.getElementById('upload').onchange = (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(event) {
    img = new Image();
    img.src = event.target.result;
    img.onload = () => drawFrame(0);
  }
  reader.readAsDataURL(file);
}

// Draw a single frame on canvas
function drawFrame(frameIndex) {
  if (!img) return;
  const [sx, sy] = squish[frameIndex];
  const w = 112 * sx;
  const h = 112 * sy;
  ctx.clearRect(0,0,112,112);
  ctx.drawImage(img, (112-w)/2, (112-h)/2, w, h);
}

// Animate the PetPet effect
function animatePetPet() {
  let i = 0;
  const interval = setInterval(() => {
    drawFrame(i);
    i++;
    if (i >= squish.length) clearInterval(interval);
  }, 100);
}

// Button to generate the animation
document.getElementById('generate').onclick = () => {
  if (!img) {
    alert("Please upload an image first!");
    return;
  }
  animatePetPet();
}
</script>

</body>
</html>
